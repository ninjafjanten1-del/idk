<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Live Chat</title>
  <style>
    :root {
      --bg: #005293;
      --panel: #00457c;
      --panel-soft: #003e70;
      --text: #fecb00;
      --muted: #ffe173;
      --accent: #fecb00;
      --accent-strong: #ffd84a;
      --danger: #ef4444;
      --ok: #22c55e;
      --self: #003865;
      --other: #004274;
      --border: #ffd84a;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(circle at top, #0a63aa 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .app {
      width: min(950px, 100%);
      height: min(92dvh, 820px);
      background: color-mix(in srgb, var(--panel) 94%, black);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      background: rgba(0, 69, 124, 0.88);
      backdrop-filter: blur(4px);
      padding: 1rem;
      display: grid;
      gap: 0.75rem;
    }

    .topbar h1 { margin: 0; font-size: 1.05rem; letter-spacing: 0.02em; }

    .auth-grid, .setup-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 0.6rem;
    }

    input, button {
      min-height: 44px;
      touch-action: manipulation;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #003866;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font-size: 0.92rem;
    }

    input::placeholder { color: var(--muted); }

    button {
      background: var(--accent-strong);
      border: none;
      color: #003865;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: .65; cursor: not-allowed; }

    .status {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--danger);
      display: inline-block; margin-right: 0.35rem; vertical-align: middle;
    }
    .dot.ok { background: var(--ok); }

    .messages {
      overflow: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      background:
        linear-gradient(rgba(0, 82, 147, 0.56), rgba(0, 82, 147, 0.44)),
        repeating-linear-gradient(0deg, rgba(254,203,0,0.09), rgba(254,203,0,0.09) 1px, transparent 1px, transparent 26px);
    }

    .msg {
      max-width: min(76%, 620px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.6rem 0.75rem;
      background: var(--other);
      align-self: flex-start;
      word-break: break-word;
    }
    .msg.self { align-self: flex-end; background: var(--self); border-color: #155e75; }

    .meta {
      font-size: 0.72rem;
      color: #ffe173;
      opacity: 0.82;
      margin-bottom: 0.35rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 0.8rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.6rem;
      background: rgba(0, 69, 124, 0.92);
    }

    .helper { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    @media (max-width: 860px) {
      body { padding: 0.5rem; }
      .app {
        width: 100%;
        height: 100dvh;
      }
      .auth-grid, .setup-grid { grid-template-columns: 1fr 1fr; }
      .msg { max-width: 88%; }
    }

    @media (max-width: 640px) {
      body { padding: 0; }
      .app {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .topbar { padding: 0.75rem; gap: 0.55rem; }
      .topbar h1 { font-size: 1rem; }
      .helper { font-size: 0.74rem; }
      .status { font-size: 0.75rem; gap: 0.4rem; }
      .auth-grid, .setup-grid { grid-template-columns: 1fr; gap: 0.45rem; }

      input, button {
        font-size: 16px;
        min-height: 46px;
      }

      .messages {
        padding: 0.65rem;
        gap: 0.55rem;
      }

      .msg {
        max-width: 94%;
        padding: 0.55rem 0.65rem;
      }

      .composer {
        position: sticky;
        bottom: 0;
        grid-template-columns: 1fr;
        padding: 0.65rem;
        gap: 0.45rem;
        padding-bottom: calc(0.65rem + env(safe-area-inset-bottom));
      }

      #sendBtn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>🔒 Private Live Chat</h1>

      <div class="auth-grid">
        <input id="authUsername" maxlength="24" placeholder="Username" autocomplete="username" autocapitalize="none" />
        <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" />
        <button id="registerBtn" type="button">Register</button>
        <button id="loginBtn" type="button">Login</button>
      </div>

      <div class="setup-grid">
        <input id="nickname" maxlength="24" placeholder="Display nickname (optional)" autocapitalize="words" />
        <input id="room" maxlength="40" placeholder="Private room name" autocapitalize="none" />
        <input id="passphrase" type="password" placeholder="Shared room passphrase" />
        <button id="joinBtn" type="button" disabled>Join / Switch Room</button>
      </div>

      <div class="status">
        <span id="connection"><span class="dot"></span>Not connected</span>
        <span id="userInfo">User: not logged in</span>
        <span id="roomInfo">Room: —</span>
      </div>
      <div class="helper">Accounts are stored in this browser (localStorage). Login first, then join a room to chat.</div>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="composer" class="composer" autocomplete="off">
      <input id="messageInput" placeholder="Type a message..." enterkeyhint="send" disabled />
      <button type="submit" id="sendBtn" disabled>Send</button>
    </form>
  </main>

  <script>
    const STORAGE_KEY = "private-chat.accounts.v1";
    const SESSION_KEY = "private-chat.session-user.v1";
    const HISTORY_KEY = "private-chat.histories.v1";
    const HISTORY_LIMIT = 200;

    const state = {
      nickname: "",
      room: "",
      passphrase: "",
      account: null,
      channel: null,
      key: null,
      sessionId: crypto.randomUUID(),
    };

    const ui = {
      authUsername: document.getElementById("authUsername"),
      authPassword: document.getElementById("authPassword"),
      registerBtn: document.getElementById("registerBtn"),
      loginBtn: document.getElementById("loginBtn"),
      nickname: document.getElementById("nickname"),
      room: document.getElementById("room"),
      passphrase: document.getElementById("passphrase"),
      joinBtn: document.getElementById("joinBtn"),
      messages: document.getElementById("messages"),
      composer: document.getElementById("composer"),
      messageInput: document.getElementById("messageInput"),
      sendBtn: document.getElementById("sendBtn"),
      connection: document.getElementById("connection"),
      userInfo: document.getElementById("userInfo"),
      roomInfo: document.getElementById("roomInfo"),
    };

    const loadAccounts = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const saveAccounts = (accounts) => localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));

    const loadHistories = () => JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
    const saveHistories = (histories) => localStorage.setItem(HISTORY_KEY, JSON.stringify(histories));

    function persistRoomMessage(room, message) {
      if (!room) return;
      const histories = loadHistories();
      const roomHistory = histories[room] || [];
      roomHistory.push({ sender: message.sender, body: message.body, createdAt: message.createdAt });
      histories[room] = roomHistory.slice(-HISTORY_LIMIT);
      saveHistories(histories);
    }

    function loadRoomHistory(room) {
      const histories = loadHistories();
      return histories[room] || [];
    }

    function appendMessage({ sender, body, mine = false, createdAt = Date.now(), system = false }) {
      const wrapper = document.createElement("article");
      wrapper.className = `msg ${mine ? "self" : ""}`;
      if (system) {
        wrapper.style.opacity = "0.82";
        wrapper.style.fontStyle = "italic";
      }
      const time = new Date(createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      wrapper.innerHTML = `<div class="meta"><span>${sender}</span><span>${time}</span></div><div>${body}</div>`;
      ui.messages.appendChild(wrapper);
      ui.messages.scrollTop = ui.messages.scrollHeight;
    }

    function setConnection(connected, text) {
      ui.connection.innerHTML = `<span class="dot ${connected ? "ok" : ""}"></span>${text}`;
      ui.messageInput.disabled = !connected;
      ui.sendBtn.disabled = !connected;
    }

    function setAuthState() {
      const loggedIn = !!state.account;
      ui.userInfo.textContent = loggedIn ? `User: ${state.account}` : "User: not logged in";
      ui.joinBtn.disabled = !loggedIn;
      ui.authUsername.disabled = loggedIn;
      ui.authPassword.disabled = loggedIn;
      ui.registerBtn.disabled = loggedIn;
      ui.loginBtn.textContent = loggedIn ? "Logout" : "Login";
    }

    async function sha256Hex(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function deriveAesKey(passphrase, room) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: enc.encode(`room::${room}`), iterations: 120000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    function toBase64(bytes) {
      const bin = String.fromCharCode(...new Uint8Array(bytes));
      return btoa(bin);
    }
    function fromBase64(base64) {
      const bin = atob(base64);
      return Uint8Array.from(bin, c => c.charCodeAt(0));
    }

    async function encryptJson(data, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const plain = new TextEncoder().encode(JSON.stringify(data));
      const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plain);
      return { iv: toBase64(iv), data: toBase64(cipher) };
    }

    async function decryptJson(payload, key) {
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: fromBase64(payload.iv) }, key, fromBase64(payload.data));
      return JSON.parse(new TextDecoder().decode(plain));
    }

    async function registerAccount() {
      const username = ui.authUsername.value.trim();
      const password = ui.authPassword.value;
      if (username.length < 3 || password.length < 6) {
        appendMessage({ sender: "System", body: "Username must be at least 3 chars and password at least 6 chars.", system: true });
        return;
      }

      const accounts = loadAccounts();
      if (accounts[username]) {
        appendMessage({ sender: "System", body: "That username already exists.", system: true });
        return;
      }

      accounts[username] = { passwordHash: await sha256Hex(password), createdAt: Date.now() };
      saveAccounts(accounts);
      appendMessage({ sender: "System", body: `Account '${username}' created. Please login.`, system: true });
      ui.authPassword.value = "";
    }

    async function loginOrLogout() {
      if (state.account) {
        state.account = null;
        localStorage.removeItem(SESSION_KEY);
        if (state.channel) state.channel.close();
        state.channel = null;
        state.key = null;
        ui.roomInfo.textContent = "Room: —";
        setConnection(false, "Not connected");
        appendMessage({ sender: "System", body: "Logged out.", system: true });
        setAuthState();
        return;
      }

      const username = ui.authUsername.value.trim();
      const password = ui.authPassword.value;
      const accounts = loadAccounts();
      if (!accounts[username]) {
        appendMessage({ sender: "System", body: "Account not found.", system: true });
        return;
      }

      const incomingHash = await sha256Hex(password);
      if (incomingHash !== accounts[username].passwordHash) {
        appendMessage({ sender: "System", body: "Invalid password.", system: true });
        return;
      }

      state.account = username;
      localStorage.setItem(SESSION_KEY, username);
      ui.nickname.value = username;
      ui.authPassword.value = "";
      appendMessage({ sender: "System", body: `Logged in as ${username}.`, system: true });
      setAuthState();
    }

    async function joinRoom() {
      if (!state.account) {
        appendMessage({ sender: "System", body: "Please login first.", system: true });
        return;
      }

      const nickname = ui.nickname.value.trim() || state.account;
      const room = ui.room.value.trim();
      const passphrase = ui.passphrase.value;
      if (!room || !passphrase) {
        appendMessage({ sender: "System", body: "Enter both room and room passphrase.", system: true });
        return;
      }

      if (state.channel) state.channel.close();

      state.nickname = nickname;
      state.room = room;
      state.passphrase = passphrase;
      state.key = await deriveAesKey(passphrase, room);
      state.channel = new BroadcastChannel(`private-chat::${room}`);

      state.channel.onmessage = async (event) => {
        try {
          const data = await decryptJson(event.data, state.key);
          if (data.sessionId === state.sessionId) return;
          appendMessage({ sender: data.sender, body: data.body, createdAt: data.createdAt });
          persistRoomMessage(state.room, data);
        } catch {
          // wrong passphrase / malformed payload
        }
      };

      setConnection(true, "Secure channel active");
      ui.roomInfo.textContent = `Room: ${room}`;
      ui.messages.replaceChildren();
      const roomHistory = loadRoomHistory(room);
      if (roomHistory.length) {
        roomHistory.forEach((saved) => appendMessage({ sender: saved.sender, body: saved.body, createdAt: saved.createdAt }));
        appendMessage({ sender: "System", body: `Loaded ${roomHistory.length} saved messages for this group chat.`, system: true });
      }
      appendMessage({ sender: "System", body: `Connected as ${nickname} (${state.account}).`, system: true });
    }

    async function sendMessage(event) {
      event.preventDefault();
      const body = ui.messageInput.value.trim();
      if (!body || !state.channel || !state.key || !state.account) return;

      const message = {
        sender: `${state.nickname}`,
        body,
        createdAt: Date.now(),
        sessionId: state.sessionId,
        account: state.account,
      };

      const payload = await encryptJson(message, state.key);
      state.channel.postMessage(payload);
      appendMessage({ ...message, mine: true });
      persistRoomMessage(state.room, message);
      ui.messageInput.value = "";
      ui.messageInput.focus();
    }

    function restoreSession() {
      const savedUser = localStorage.getItem(SESSION_KEY);
      const accounts = loadAccounts();
      if (savedUser && accounts[savedUser]) {
        state.account = savedUser;
        ui.authUsername.value = savedUser;
        ui.nickname.value = savedUser;
        appendMessage({ sender: "System", body: `Restored login for ${savedUser}.`, system: true });
      }
      setAuthState();
    }

    ui.registerBtn.addEventListener("click", registerAccount);
    ui.loginBtn.addEventListener("click", loginOrLogout);
    ui.joinBtn.addEventListener("click", joinRoom);
    ui.composer.addEventListener("submit", sendMessage);

    setConnection(false, "Not connected");
    appendMessage({ sender: "System", body: "Create an account or login, then join a private room.", system: true });
    restoreSession();
  </script>
</body>
</html>
